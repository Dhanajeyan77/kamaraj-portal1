name: "javascript-sandbox"
mode: ONCE
hostname: "Kamaraj-JS-Sandbox"
cwd: "/app"

# ==========================================
# 1. NAMESPACE & PRIVILEGE DROP (THE VAULT)
# ==========================================
clone_newnet: true      
clone_newuser: true     # 🔥 CRITICAL: Isolates user IDs
clone_newipc: true      
clone_newpid: true      
clone_newuts: true      
keep_caps: false        
keep_env: false         

uidmap { inside_id: "1000"; outside_id: "nobody" }
gidmap { inside_id: "1000"; outside_id: "nogroup" }

# ==========================================
# 2. RESOURCE LIMITS (THE GOVERNOR)
# ==========================================
time_limit: 5          
rlimit_as: 1024        # 1GB Virtual (V8 Engine needs this to boot)
rlimit_nproc: 20       # Node.js internal threads (Event Loop/GC)
rlimit_fsize: 2        

# ==========================================
# 3. CGROUP V2 PROTECTION (THE SHIELD)
# ==========================================
use_cgroupv2: true
cgroup_mem_max: 536870912      # STRICTLY 512 MB physical RAM
cgroup_pids_max: 20            

# ==========================================
# 4. SECURE MOUNTS (THE FILESYSTEM)
# ==========================================
mount { src: "/usr"; dst: "/usr"; is_bind: true; rw: false }
mount { src: "/lib"; dst: "/lib"; is_bind: true; rw: false }
mount { src: "/lib64"; dst: "/lib64"; is_bind: true; rw: false }
mount { src: "/bin"; dst: "/bin"; is_bind: true; rw: false }
mount { src: "/proc"; dst: "/proc"; is_bind: true; rw: false }

# Safe temporary folder
mount { dst: "/tmp"; fstype: "tmpfs"; rw: true }

# Required symlinks and devices for Node.js
mount { src: "/etc/alternatives"; dst: "/etc/alternatives"; is_bind: true; rw: false }
mount { src: "/dev/urandom"; dst: "/dev/urandom"; is_bind: true; rw: false }
mount { src: "/dev/null"; dst: "/dev/null"; is_bind: true; rw: true }
mount { src: "/dev/zero"; dst: "/dev/zero"; is_bind: true; rw: false }