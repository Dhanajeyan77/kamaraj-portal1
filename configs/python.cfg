name: "sandbox-cage"
mode: ONCE
hostname: "Kamaraj-Sandbox"
cwd: "/app"

# --- IDENTITY MAPPING ---
uidmap { inside_id: "0", outside_id: "1000", count: 1 }
gidmap { inside_id: "0", outside_id: "1000", count: 1 }

# --- RESOURCE LIMITS ---
time_limit: 3
rlimit_cpu: 1
rlimit_as: 512           # 🔥 Increased to 512MB: Python 3.11 needs more overhead than C
rlimit_nproc: 4          # 🔥 Increased to 4: Python's garbage collector/threads need more than 2
rlimit_fsize: 2

clone_newnet: true

# --- MOUNT SETTINGS ---
# We must map these so Python can find its internal modules
mount { src: "/usr"; dst: "/usr"; is_bind: true; rw: false }
mount { src: "/bin"; dst: "/bin"; is_bind: true; rw: false }
mount { src: "/lib"; dst: "/lib"; is_bind: true; rw: false }
mount { src: "/lib64"; dst: "/lib64"; is_bind: true; rw: false }

# This maps the student's code folder
# Note: In executor.py you are using --bindmount, so we don't hardcode it here.

mount { dst: "/tmp"; fstype: "tmpfs"; rw: true }
mount { src: "/proc"; dst: "/proc"; is_bind: true }