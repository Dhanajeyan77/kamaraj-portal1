name: "sandbox-cage"
mode: ONCE
hostname: "Kamaraj-Sandbox"
cwd: "/app"

# --- IDENTITY MAPPING ---
uidmap { inside_id: "0", outside_id: "1000", count: 1 }
gidmap { inside_id: "0", outside_id: "1000", count: 1 }

# --- RESOURCE LIMITS ---
time_limit: 5            
rlimit_cpu: 2            # 🔥 Hard CPU calculation limit
rlimit_as: 512           
rlimit_nproc: 10         
rlimit_fsize: 5          

# --- NETWORK ISOLATION ---
clone_newnet: true       

# --- MOUNT SETTINGS ---
mount { src: "/usr"; dst: "/usr"; is_bind: true; rw: false }
mount { src: "/lib"; dst: "/lib"; is_bind: true; rw: false }
mount { src: "/lib64"; dst: "/lib64"; is_bind: true; rw: false }
mount { src: "/bin"; dst: "/bin"; is_bind: true; rw: false }
mount { dst: "/tmp"; fstype: "tmpfs"; rw: true }