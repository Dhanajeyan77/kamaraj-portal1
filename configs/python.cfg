name: "sandbox-cage"
mode: ONCE
hostname: "Kamaraj-Sandbox"
cwd: "/app"

# --- IDENTITY MAPPING ---
# Ensure outside_id matches the result of 'id -u' in your C1 container
uidmap { inside_id: "0", outside_id: "1000", count: 1 }
gidmap { inside_id: "0", outside_id: "1000", count: 1 }

# --- RESOURCE LIMITS (STRENGTHENED) ---
time_limit: 3            # Wall clock: Max 3 seconds total
rlimit_cpu: 1            # CPU Time: Max 1 second of actual calculation 🔥
rlimit_as: 256           # Memory: 256MB (Safe for Java, prevents OOM)
rlimit_nproc: 2          # Processes: Main script + 1 child (Kills Fork Bombs) 🔥
rlimit_fsize: 2          # Files: Max 2MB output to prevent disk filling

# --- NETWORK ISOLATION ---
clone_newnet: true       # No internet access inside the cage

# --- MOUNT SETTINGS ---
mount { src: "/usr"; dst: "/usr"; is_bind: true; rw: false }
mount { src: "/lib"; dst: "/lib"; is_bind: true; rw: false }
mount { src: "/lib64"; dst: "/lib64"; is_bind: true; rw: false }
mount { src: "/bin"; dst: "/bin"; is_bind: true; rw: false }

# Critical: Mount the folder where you store 'temp_scripts' as RW
mount { 
    src: "/home/thala_thalapathy/kamaraj-portal1/temp_submissions"; 
    dst: "/app"; 
    is_bind: true; 
    rw: true 
}

mount { dst: "/tmp"; fstype: "tmpfs"; rw: true }